global
    log stdout format raw local0
    maxconn 50000
    nbthread 4
    cpu-map auto:1/1-4 0-3

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option redispatch
    option forwardfor
    option http-server-close
    retries 3
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    timeout http-request 10s

# Stats endpoint
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-legends
    stats show-node
    stats auth admin:admin
    # NOTE: Change these credentials in production!
    no log

# HTTP frontend
frontend http_front
    bind *:80
    default_backend http_back

    # ACL examples
    acl is_health path /health
    use_backend health_check if is_health

# Main HTTP backend - round robin across nginx backends
backend http_back
    balance roundrobin
    option httpchk GET /
    http-check expect status 200
    server backend1 backend1:80 check inter 2s rise 2 fall 3
    server backend2 backend2:80 check inter 2s rise 2 fall 3

# Health check backend
backend health_check
    server backend1 backend1:80
