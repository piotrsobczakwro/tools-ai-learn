# GitLab CI/CD Example Pipeline
# Place this file at the root of your GitLab repository as .gitlab-ci.yml

# ── Global configuration ──────────────────────────────────────────────────────

default:
  image: node:20-alpine
  before_script:
    - echo "Starting job $CI_JOB_NAME on branch $CI_COMMIT_REF_NAME"
  tags:
    - docker

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  NODE_ENV: test
  POSTGRES_DB: testdb
  POSTGRES_USER: testuser
  POSTGRES_PASSWORD: testpassword
  REDIS_URL: redis://redis:6379
  DATABASE_URL: postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@postgres:5432/$POSTGRES_DB

# Cache node_modules between jobs on the same branch
cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - node_modules/
    - .npm/

# ── Stages ───────────────────────────────────────────────────────────────────

stages:
  - validate
  - test
  - security
  - build
  - deploy

# ── Templates (reusable anchors) ─────────────────────────────────────────────

.node_setup: &node_setup
  before_script:
    - npm ci --cache .npm --prefer-offline

.only_main: &only_main
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

.not_main: &not_main
  rules:
    - if: $CI_COMMIT_BRANCH != "main"
      when: always
    - when: never

# ── Stage: validate ───────────────────────────────────────────────────────────

lint:
  stage: validate
  <<: *node_setup
  script:
    - npm run lint
    - npm run format:check
  artifacts:
    reports:
      codequality: gl-code-quality-report.json
    when: always

typecheck:
  stage: validate
  <<: *node_setup
  script:
    - npm run typecheck

# ── Stage: test ───────────────────────────────────────────────────────────────

unit-tests:
  stage: test
  <<: *node_setup
  script:
    - npm test -- --coverage --coverageReporters=cobertura
  coverage: '/Statements\s*:\s*(\d+(?:\.\d+)?)%/'
  artifacts:
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    expire_in: 1 week

integration-tests:
  stage: test
  <<: *node_setup
  services:
    - name: postgres:16
      alias: postgres
      variables:
        POSTGRES_DB: $POSTGRES_DB
        POSTGRES_USER: $POSTGRES_USER
        POSTGRES_PASSWORD: $POSTGRES_PASSWORD
    - name: redis:7.2
      alias: redis
  script:
    - npm run test:integration
  artifacts:
    reports:
      junit: junit-integration.xml
    expire_in: 1 week

# ── Stage: security ───────────────────────────────────────────────────────────

dependency-scanning:
  stage: security
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DS_EXCLUDED_ANALYZERS: ""
  script:
    - docker run --rm -v "$PWD:/app" aquasec/trivy:latest fs --exit-code 1 --severity HIGH,CRITICAL /app
  allow_failure: true

sast:
  stage: security
  # GitLab built-in SAST (requires Ultimate/Gold tier, or use the template)
  # Uncomment to enable GitLab SAST:
  # include:
  #   - template: Security/SAST.gitlab-ci.yml
  script:
    - echo "Run your SAST tool here (semgrep, bandit, etc.)"
  allow_failure: true

secret-detection:
  stage: security
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks detect --source . --verbose --redact
  allow_failure: true

# ── Stage: build ─────────────────────────────────────────────────────────────

build-app:
  stage: build
  <<: *node_setup
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day

build-docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  <<: *only_main
  variables:
    IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    LATEST_TAG: $CI_REGISTRY_IMAGE:latest
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_TAG -t $LATEST_TAG .
    - docker push $IMAGE_TAG
    - docker push $LATEST_TAG
  after_script:
    - docker logout $CI_REGISTRY

# ── Stage: deploy ─────────────────────────────────────────────────────────────

deploy-staging:
  stage: deploy
  image: alpine:3.18
  <<: *only_main
  environment:
    name: staging
    url: https://staging.example.com
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$STAGING_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$STAGING_HOST_KEY" >> ~/.ssh/known_hosts
  script:
    - ssh $STAGING_USER@$STAGING_HOST "
        cd /opt/app &&
        docker pull $CI_REGISTRY_IMAGE:latest &&
        docker-compose up -d --no-deps app &&
        docker image prune -f
      "
    - sleep 10
    - |
      if ! curl -sf https://staging.example.com/health; then
        echo "Smoke test failed!"
        exit 1
      fi

deploy-production:
  stage: deploy
  image: alpine:3.18
  <<: *only_main
  environment:
    name: production
    url: https://app.example.com
  when: manual  # Requires manual approval in GitLab UI
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$PROD_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$PROD_HOST_KEY" >> ~/.ssh/known_hosts
  script:
    - ssh $PROD_USER@$PROD_HOST "
        cd /opt/app &&
        docker pull $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA &&
        docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE:stable &&
        docker-compose up -d --no-deps app &&
        docker image prune -f
      "
