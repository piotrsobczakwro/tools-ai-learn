version: "3.8"

# Monitoring & Logging Stack:
#   - Grafana          (dashboards & alerting)
#   - Elasticsearch    (shared datastore for ELK + Graylog)
#   - Logstash         (log processing pipeline)
#   - Kibana           (log exploration UI)
#   - MongoDB          (Graylog metadata store)
#   - Graylog          (log management & SIEM)
#   - Jaeger           (distributed tracing)

networks:
  monitoring-net:
    driver: bridge

volumes:
  grafana-data:
  elasticsearch-data:
  mongodb-data:
  graylog-data:
  jaeger-data:

services:

  # ─── Elasticsearch ───────────────────────────────────────────────────────────

  elasticsearch:
    image: docker.io/elastic/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - node.name=elasticsearch
      - cluster.name=elk-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - monitoring-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ─── Logstash ────────────────────────────────────────────────────────────────

  logstash:
    image: docker.io/elastic/logstash:8.11.0
    container_name: logstash
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - "LS_JAVA_OPTS=-Xms512m -Xmx512m"
      - XPACK_MONITORING_ENABLED=false
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "5044:5044"   # Beats input
      - "5000:5000"   # TCP JSON input
      - "5001:5001/udp" # UDP JSON input
      - "5514:5514"   # Syslog input
      - "9600:9600"   # Logstash API
    networks:
      - monitoring-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9600/_node/stats"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ─── Kibana ──────────────────────────────────────────────────────────────────

  kibana:
    image: docker.io/elastic/kibana:8.11.0
    container_name: kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
      # Generate a strong random key for production: openssl rand -hex 32
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY:-a7a6311933d3503b89bc2dbc36572c33a6c10925682e591bffcab6911c06786d}
    ports:
      - "5601:5601"
    networks:
      - monitoring-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5601/api/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  # ─── Grafana ─────────────────────────────────────────────────────────────────

  grafana:
    image: docker.io/grafana/grafana:10.2.0
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=localhost
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - monitoring-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ─── MongoDB (required by Graylog) ───────────────────────────────────────────

  mongodb:
    image: docker.io/library/mongo:6.0
    container_name: graylog-mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_GRAYLOG_USER:-graylog}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_GRAYLOG_PASSWORD:-graylog_password}
      - MONGO_INITDB_DATABASE=graylog
    volumes:
      - mongodb-data:/data/db
    networks:
      - monitoring-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ─── Graylog ─────────────────────────────────────────────────────────────────
  # Default login: admin / admin
  # GRAYLOG_ROOT_PASSWORD_SHA2 = sha256("admin")

  graylog:
    image: docker.io/graylog/graylog:5.2
    container_name: graylog
    depends_on:
      mongodb:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      - GRAYLOG_NODE_ID_FILE=/usr/share/graylog/data/config/node-id
      # Generate a strong secret: pwgen -N 1 -s 96
      - GRAYLOG_PASSWORD_SECRET=${GRAYLOG_PASSWORD_SECRET:-somepasswordsecret1234567890abcdef}
      # SHA2 of the admin password. Default is sha256("admin") — CHANGE IN PRODUCTION.
      # Generate: echo -n "yourpassword" | sha256sum | cut -d " " -f 1
      - GRAYLOG_ROOT_PASSWORD_SHA2=${GRAYLOG_ROOT_PASSWORD_SHA2:-8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918}
      - GRAYLOG_HTTP_BIND_ADDRESS=0.0.0.0:9000
      - GRAYLOG_HTTP_EXTERNAL_URI=http://localhost:9000/
      - GRAYLOG_ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - GRAYLOG_MONGODB_URI=mongodb://${MONGO_GRAYLOG_USER:-graylog}:${MONGO_GRAYLOG_PASSWORD:-graylog_password}@mongodb:27017/graylog
    volumes:
      - graylog-data:/usr/share/graylog/data
    ports:
      - "9000:9000"     # Graylog web UI & API
      - "12201:12201"   # GELF UDP
      - "12201:12201/tcp" # GELF TCP
      - "1514:1514"     # Syslog TCP
      - "1514:1514/udp" # Syslog UDP
    networks:
      - monitoring-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/api/system/lbstatus"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  # ─── Jaeger (All-in-one: collector + query + UI) ──────────────────────────────

  jaeger:
    image: docker.io/jaegertracing/all-in-one:1.52
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=memory
      - MEMORY_MAX_TRACES=50000
    ports:
      - "5775:5775/udp"   # Zipkin compact thrift (legacy)
      - "6831:6831/udp"   # Jaeger compact thrift
      - "6832:6832/udp"   # Jaeger binary thrift
      - "5778:5778"       # Agent config server
      - "16686:16686"     # Jaeger UI
      - "14250:14250"     # gRPC (model.proto)
      - "14268:14268"     # Jaeger collector HTTP
      - "14269:14269"     # Admin/health
      - "4317:4317"       # OTLP gRPC
      - "4318:4318"       # OTLP HTTP
    networks:
      - monitoring-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:14269/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
