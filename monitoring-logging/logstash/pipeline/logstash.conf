input {
  # Accept logs from Beats agents (Filebeat, Metricbeat, etc.)
  beats {
    port => 5044
  }

  # Accept syslog messages
  syslog {
    port => 5514
    type => "syslog"
  }

  # Accept plain TCP log lines
  tcp {
    port => 5000
    codec => json_lines
    type => "tcp-json"
  }

  # Accept UDP log lines
  udp {
    port => 5001
    codec => json_lines
    type => "udp-json"
  }
}

filter {
  # Parse syslog messages
  if [type] == "syslog" {
    grok {
      match => { "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_hostname} %{DATA:syslog_program}(?:\[%{POSINT:syslog_pid}\])?: %{GREEDYDATA:syslog_message}" }
      add_field => [ "received_at", "%{@timestamp}" ]
      add_field => [ "received_from", "%{host}" ]
    }
    date {
      match => [ "syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss" ]
    }
  }

  # Parse nginx access logs
  if [fields][log_type] == "nginx_access" {
    grok {
      match => {
        "message" => '%{IPORHOST:remote_addr} - %{DATA:remote_user} \[%{HTTPDATE:time_local}\] "%{WORD:method} %{DATA:request} HTTP/%{NUMBER:http_version}" %{NUMBER:status} %{NUMBER:body_bytes_sent} "%{DATA:http_referer}" "%{DATA:http_user_agent}"'
      }
    }
    mutate {
      convert => {
        "status" => "integer"
        "body_bytes_sent" => "integer"
      }
    }
    date {
      match => [ "time_local", "dd/MMM/yyyy:HH:mm:ss Z" ]
    }
  }

  # Enrich with GeoIP data if remote_addr exists
  if [remote_addr] {
    geoip {
      source => "remote_addr"
      target => "geoip"
    }
  }

  # Drop health check logs
  if [request] =~ "^(GET|HEAD) /health" {
    drop {}
  }

  # Add environment tag
  mutate {
    add_field => { "environment" => "development" }
  }
}

output {
  # Send everything to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "logstash-%{[fields][log_type]:general}-%{+YYYY.MM.dd}"
    ilm_enabled => false
  }

  # Debug: also output to stdout (comment out in production)
  stdout {
    codec => rubydebug
  }
}
